name: Daily market brief email

on:
  schedule:
    # 00:30 UTC = 07:30 Asia/Bangkok (ICT), Monday–Friday.
    # Monday's run covers Friday's US close.
    - cron: "30 0 * * 1-5"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build the image only, do not send the email"
        type: boolean
        default: false

jobs:
  send-brief:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Install Chromium for rendering
        run: python -m playwright install --with-deps chromium

      - name: Build and send MARKET BRIEF
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python scripts/market_brief.py --dry-run
          else
            python scripts/market_brief.py
          fi

      - name: Upload brief image (for dry-run inspection)
        if: ${{ github.event.inputs.dry_run == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: market-brief
          path: scripts/market_brief.png
